<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/favicon-32x32-DQjEQYWa.png"
    />
    <title>Frontend Mentor | IP Address Tracker</title>
    <script type="module" crossorigin src="./assets/index-CorliMwu.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-zUYtL7zA.css">
  </head>
  <body>
    <header class="header">
      <h1 class="header__title">IP Address Tracker</h1>

      <form class="header__form" role="search">
        <input
          type="text"
          class="header__input"
          placeholder="Search for any IP address or domain"
        />
        <button class="header__btn">
          <img class="btn__icon" src="data:image/svg+xml,%3csvg%20xmlns='http://www.w3.org/2000/svg'%20width='11'%20height='14'%3e%3cpath%20fill='none'%20stroke='%23FFF'%20stroke-width='3'%20d='M2%201l6%206-6%206'/%3e%3c/svg%3e" />
        </button>
      </form>

      <section class="info">
        <div class="info__element">
          <h2 class="info__element-title">IP Address</h2>
          <div class="info__element-text" id="ip">-</div>
        </div>
        <div class="info__element">
          <h2 class="info__element-title">Location</h2>
          <div class="info__element-text" id="location">-</div>
        </div>
        <div class="info__element">
          <h2 class="info__element-title">Timezone</h2>
          <div class="info__element-text">
            UTC <span id="timezone">00:00</span>
          </div>
        </div>
        <div class="info__element">
          <h2 class="info__element-title">ISP</h2>
          <div class="info__element-text" id="isp">-</div>
        </div>
      </section>
    </header>

    <main class="main" id="map" aria-label="map">Здесь будет карта</main>

    <footer class="footer">
      <div class="footer__attribution">
        Challenge by
        <a
          class="footer__link"
          href="https://www.frontendmentor.io?ref=challenge"
          target="_blank"
          >Frontend Mentor</a
        >
        | Coded by
        <a
          class="footer__link"
          href="https://github.com/zendrolya"
          target="_blank"
          >Ilya Drozdenko</a
        >
      </div>
    </footer>

  </body>
</html>
