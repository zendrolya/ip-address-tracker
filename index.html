<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./src/fonts/font.css" />
    <link rel="stylesheet" href="./src/styles/variables.css" />
    <link rel="stylesheet" href="./src/styles/style.css" />
    <link rel="stylesheet" href="./src/styles/desktop.css" />
    <title>Frontend Mentor | IP Address Tracker</title>
  </head>
  <body>
    <header class="header">
      <h1 class="header__title">IP Address Tracker</h1>

      <form class="header__form" role="search">
        <input
          type="text"
          class="header__input"
          placeholder="Search for any IP address or domain"
        />
        <button class="header__btn">
          <img class="btn__icon" src="./images/icon-arrow.svg" />
        </button>
      </form>

      <section class="info">
        <div class="info__element">
          <h2 class="info__element-title">IP Address</h2>
          <div class="info__element-text" id="ip">-</div>
        </div>
        <div class="info__element">
          <h2 class="info__element-title">Location</h2>
          <div class="info__element-text" id="location">-</div>
        </div>
        <div class="info__element">
          <h2 class="info__element-title">Timezone</h2>
          <div class="info__element-text">
            UTC <span id="timezone">00:00</span>
          </div>
        </div>
        <div class="info__element">
          <h2 class="info__element-title">ISP</h2>
          <div class="info__element-text" id="isp">-</div>
        </div>
      </section>
    </header>

    <main class="main" id="map" aria-label="map">Здесь будет карта</main>

    <footer class="footer">
      <div class="footer__attribution">
        Challenge by
        <a
          class="footer__link"
          href="https://www.frontendmentor.io?ref=challenge"
          target="_blank"
          >Frontend Mentor</a
        >
        | Coded by
        <a
          class="footer__link"
          href="https://github.com/zendrolya"
          target="_blank"
          >Ilya Drozdenko</a
        >
      </div>
    </footer>

    <script type="module" src="./src/scripts/index.js"></script>
  </body>
</html>
